name: Run Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout code
          uses: actions/checkout@v6.0.2
          
        - name: Setup Python
          uses: actions/setup-python@v6.2.0
          with:
            python-version: "3.12"
  
        - name: Install dependencies
          run: |
            pip install -r requirements.txt

        - name: Run tests
          run: pytest
